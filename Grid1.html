<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            padding: 0;

        }
        .Grid{
            background-color: grey;
            height: 100vh;
            display: grid;
            grid-template-columns: repeat(auto-fit , minmax(200px,1fr));
            grid-template-rows: 1fr;
            gap: 30px;
            padding: 30px;
            text-align: center;
            overflow: hidden;
        }
        .box{
            background-color: rgb(255, 0, 221);
            aspect-ratio: 1/1;

        }
        .box img{
            text-align: center;
            font-size: medium;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .h1{
            text-align: center;
            font-size: x-large;

        }
    </style>
</head>
<body>
